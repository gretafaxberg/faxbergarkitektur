<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Faxberg Arkitektur</title>

<style>
:root{
    --red:#ff073a;

    /* ≈ 1 cm-ish */
    --cell:38px;
}

body{
    margin:0;
    background:white;
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow:hidden;
}

/* EXACT GRID */
.grid{
    display:grid;

    grid-template-columns: repeat(30, var(--cell));
    grid-template-rows: repeat(20, var(--cell));

    width:calc(30 * var(--cell));
    height:calc(20 * var(--cell));

    justify-content:center;

    margin:20px auto;

    position:relative;
}

/* RED GRID */
.grid::before{
    content:"";
    position:absolute;
    inset:0;

    background-image:
        linear-gradient(var(--red) 1px, transparent 1px),
        linear-gradient(90deg, var(--red) 1px, transparent 1px);

    background-size:
        var(--cell) var(--cell);

    pointer-events:none;
}

/* TILES */
.tile{
    position:relative;
    overflow:hidden;
}

.tile img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* HOVER FILTER */
.overlay{
    position:absolute;
    inset:0;

    background:rgba(255,7,58,0);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;

    transition:0.25s ease;

    z-index:2;
}

.tile:hover .overlay{
    background:rgba(255,7,58,0.65);
    opacity:1;
}

/* TYPOGRAPHY */
.overlay span{
    color:white;

    font-size:30px;
    font-weight:700;

    text-transform:uppercase;

    letter-spacing:-1px;

    opacity:0;
    transition:0.25s ease;
}

.tile:hover span{
    opacity:1;
}

/* CLICK AREA */
.tile a{
    position:absolute;
    inset:0;
    z-index:3;
}

/* DOTS AT INTERSECTIONS */
.dot{
    position:absolute;

    width:12px;
    height:12px;

    border-radius:50%;

    transform:translate(-50%, -50%);

    z-index:20;
}

.red-dot{
    background:var(--red);
}

.white-dot{
    background:white;
    border:1px solid var(--red);
}


/* ------------------
   NAVIGATION TILES
------------------ */

/* 3x3 */
.about{
    grid-column:3 / span 3;
    grid-row:3 / span 3;
}

/* 5x5 */
.projects{
    grid-column:12 / span 5;
    grid-row:2 / span 5;
}

/* 3x3 */
.contact{
    grid-column:23 / span 3;
    grid-row:4 / span 3;
}


/* ------------------
   PROJECTS
------------------ */

/* 5x5 */
.t1{
    grid-column:5 / span 5;
    grid-row:10 / span 5;
}

/* 5x5 */
.t2{
    grid-column:16 / span 5;
    grid-row:11 / span 5;
}

/* 3x3 */
.t3{
    grid-column:24 / span 3;
    grid-row:12 / span 3;
}

</style>
</head>

<body>

<div class="grid">

    <!-- NAVIGATION -->

    <div class="tile about">
        <img src="nav-about.jpg">
        <div class="overlay">
            <span>ABOUT</span>
        </div>
        <a href="om.html"></a>
    </div>

    <div class="tile projects">
        <img src="nav-projects.jpg">
        <div class="overlay">
            <span>PROJECTS</span>
        </div>
        <a href="index.html"></a>
    </div>

    <div class="tile contact">
        <img src="nav-contact.jpg">
        <div class="overlay">
            <span>CONTACT</span>
        </div>
        <a href="kontakt.html"></a>
    </div>


    <!-- PROJECTS -->

    <div class="tile t1">
        <img src="bild1.jpg">
        <a href="projekt1.html"></a>
    </div>

    <div class="tile t2">
        <img src="bild2.jpg">
        <a href="projekt2.html"></a>
    </div>

    <div class="tile t3">
        <img src="bild3.jpg">
        <a href="projekt3.html"></a>
    </div>


    <!-- DOTS: EXACT GRID INTERSECTIONS -->

    <!-- x = cell * col, y = cell * row -->

    <div class="dot red-dot"
         style="left:456px; top:190px;">
    </div>

    <div class="dot white-dot"
         style="left:912px; top:418px;">
    </div>

    <div class="dot red-dot"
         style="left:760px; top:570px;">
    </div>

</div>

</body>
</html>
