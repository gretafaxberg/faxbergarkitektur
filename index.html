<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faxberg Arkitektur</title>

<style>
:root{
    --red:#ff073a;
    --cell:38px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:white;
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow:hidden;
}

/* LOGOTYPE */

.site-logo{
    position:fixed;
    top:8px;
    left:50%;
    transform:translateX(-50%);

    display:grid;
    grid-auto-flow:column;
    grid-auto-columns:var(--cell);

    z-index:999;

    text-decoration:none;
}

.site-logo span{
    width:var(--cell);
    height:var(--cell);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:16px;
    font-weight:700;

    color:red:#ff073a;
}

.empty{
    background:transparent;
}


/* GRID */

.grid{
    display:grid;

    grid-template-columns:repeat(100, var(--cell));
    grid-template-rows:repeat(100, var(--cell));

    width:calc(30 * var(--cell));
    height:calc(20 * var(--cell));

    margin:60px auto 0 auto;

    position:relative;
}

/* GRID LINES */

.grid::before{
    content:"";
    position:absolute;
    inset:0;

    background-image:
        linear-gradient(var(--red) 1px, transparent 1px),
        linear-gradient(90deg, var(--red) 1px, transparent 1px);

    background-size:var(--cell) var(--cell);

    pointer-events:none;
}

/* IMAGE BLOCKS */

.tile{
    position:relative;
    overflow:hidden;
}

.tile img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* FILTER */

.overlay{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(255,7,58,0);

    opacity:0;

    transition:0.25s ease;

    z-index:2;
}

.tile:hover .overlay{
    background:rgba(255,7,58,0.65);
    opacity:1;
}

.overlay span{
    color:white;

    font-size:30px;
    font-weight:700;

    text-transform:uppercase;
    letter-spacing:-1px;

    opacity:0;
    transition:0.25s ease;
}

.tile:hover span{
    opacity:1;
}

.tile a{
    position:absolute;
    inset:0;
    z-index:3;
}


/* NAV BLOCKS */

.about{
    grid-column:3 / span 3;
    grid-row:3 / span 3;
}

.projects{
    grid-column:12 / span 5;
    grid-row:10 / span 5;
}

.contact{
    grid-column:18 / span 4;
    grid-row:4 / span 4;
}


/* PROJECT BLOCKS */

.t1{
    grid-column:5 / span 5;
    grid-row:10 / span 5;
}

.t2{
    grid-column:23 / span 5;
    grid-row:11 / span 5;
}

.t3{
    grid-column:24 / span 3;
    grid-row:4 / span 3;
}


/* DOTS */

.dot{
    position:absolute;

    width:12px;
    height:12px;

    border-radius:50%;

    transform:translate(-50%, -50%);

    z-index:20;
}

.red-dot{
    background:var(--red);
}

.white-dot{
    background:white;
    border:1px solid var(--red);
}

</style>
</head>

<body>

<!-- LOGO -->

<a href="index.html" class="site-logo">

    <span>F</span>
    <span>A</span>
    <span>X</span>
    <span>B</span>
    <span>E</span>
    <span>R</span>
    <span>G</span>

    <span class="empty"></span>

    <span>A</span>
    <span>R</span>
    <span>K</span>
    <span>I</span>
    <span>T</span>
    <span>E</span>
    <span>K</span>
    <span>T</span>
    <span>U</span>
    <span>R</span>

    <span class="empty"></span>

    <span>A</span>
    <span>B</span>

</a>


<!-- GRID -->

<div class="grid">

    <!-- NAV -->

    <div class="tile about">
        <img src="https://picsum.photos/300?1">
        <div class="overlay"><span>ABOUT</span></div>
        <a href="#"></a>
    </div>

    <div class="tile projects">
        <img src="https://picsum.photos/500?2">
        <div class="overlay"><span>PROJECTS</span></div>
        <a href="#"></a>
    </div>

    <div class="tile contact">
        <img src="https://picsum.photos/400?3">
        <div class="overlay"><span>CONTACT</span></div>
        <a href="#"></a>
    </div>


    <!-- PROJECTS -->

    <div class="tile t1">
        <img src="https://picsum.photos/500?4">
    </div>

    <div class="tile t2">
        <img src="https://picsum.photos/500?5">
    </div>

    <div class="tile t3">
        <img src="https://picsum.photos/300?6">
    </div>


    <!-- DOTS -->

    <div class="dot red-dot" style="left:380px; top:190px;"></div>
    <div class="dot white-dot" style="left:760px; top:456px;"></div>
    <div class="dot red-dot" style="left:988px; top:608px;"></div>

</div>

</body>
</html>
