<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>faxberg arkitektur</title>
<style>
:root {
  --red: #ff073a;
  --blue: #0000FF;
  --cell: clamp(24px, 2vw, 38px);
  --font: Arial, Helvetica, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#fff;
  overflow:hidden;
  font-family:var(--font);
  cursor:none;
}

.site {
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-columns: repeat(30, var(--cell));
  grid-template-rows: repeat(24, var(--cell));
  justify-content:center;
  align-content:center;
  background-image:
    linear-gradient(var(--red) .5px, transparent .5px),
    linear-gradient(90deg, var(--red) .5px, transparent .5px);
  background-size: var(--cell) var(--cell);
}

.letter {
  display: flex;
  justify-content: center;
  align-items: center;

  color: #0000FF;
  font-size: 12px;
  text-decoration: none;

  width: 100%;
  height: 100%;

  justify-self: stretch;
  align-self: stretch;

  transform: none;
}

.tile, .static-tile {
  overflow:hidden;
  position:relative;
}

.tile img, .static-tile img {
  width:100%;
  height:100%;
  object-fit:cover;
  filter:grayscale(100%);
}

.tile .overlay {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,7,58,.65);
  color:white;
  font-size:13px;
  letter-spacing:2px;
  opacity:0;
  transition:opacity .25s ease;
}

.tile:hover .overlay {
  opacity:1;
}

.dot {
  width:10px;
  height:10px;
  border-radius:50%;
  justify-self:center;
  align-self:center;
}

.cursor {
  position:fixed;
  width:26px;
  height:26px;
  pointer-events:none;
  z-index:999;
  transform:translate(-50%,-50%);
}
.cursor::before,
.cursor::after {
  content:'';
  position:absolute;
  background:var(--red);
  left:50%; top:50%;
  transform:translate(-50%,-50%);
}
.cursor::before { width:20px; height:2px; }
.cursor::after { width:2px; height:20px; }
.ring {
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--red);
  left:50%; top:50%;
  transform:translate(-50%,-50%);
}

@media (max-width:768px) {
  :root { --cell: 18px; }
}
</style>
</head>
<body>
<div class="site" id="site"></div>
<div class="cursor" id="cursor"><div class="ring"></div></div>

<script>
const site = document.getElementById('site');

function addLetter(char, col, row) {
  const el = document.createElement('a');
  el.className = 'letter';
  el.href = '#';
  el.textContent = char;
  el.style.gridColumn = col;
  el.style.gridRow = row;
  site.appendChild(el);
}

function addTile(label, col, row, w, h, clickable = true) {
  const el = document.createElement(clickable ? 'a' : 'div');
  el.className = clickable ? 'tile' : 'static-tile';
  if (clickable) el.href = '#';
  el.style.gridColumn = `${col} / span ${w}`;
  el.style.gridRow = `${row} / span ${h}`;

  el.innerHTML = `
    <img src="https://picsum.photos/800/800?random=${Math.random()}" alt="${label}">
    ${clickable ? `<div class="overlay">${label}</div>` : ''}
  `;

  site.appendChild(el);
}

function addDot(col, row, outlined=false) {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.style.gridColumn = col;
  dot.style.gridRow = row;

  if (outlined) {
    dot.style.background = 'white';
    dot.style.border = '1px solid #ff073a';
  } else {
    dot.style.background = '#ff073a';
  }

  site.appendChild(dot);
}

// Logo following exact grid cells
'faxberg'.split('').forEach((char, i) => addLetter(char, i + 2, 2));
'rkitektur'.split('').forEach((char, i) => addLetter(char, 3, i + 3));

// Interactive blocks
addTile('ABOUT', 5, 5, 3, 3, true);
addTile('PROJECTS', 11, 11, 5, 5, true);
addTile('CONTACT', 18, 7, 4, 4, true);

// Static image blocks
addTile('', 5, 15, 4, 4, false);
addTile('', 25, 17, 5, 5, false);
addTile('', 23, 3, 3, 3, false);

// Grid intersection markers
addDot(10, 4, false);
addDot(14, 3, true);
addDot(8, 10, false);
addDot(22, 8, true);
addDot(26, 18, false);

// Cursor
const cursor = document.getElementById('cursor');
let tx = window.innerWidth/2;
let ty = window.innerHeight/2;
let x = tx;
let y = ty;
window.addEventListener('mousemove', e => {
  tx = e.clientX;
  ty = e.clientY;
});
function animate(){
  x += (tx-x)*0.18;
  y += (ty-y)*0.18;
  cursor.style.left = x + 'px';
  cursor.style.top = y + 'px';
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
